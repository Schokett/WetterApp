<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="icon" href="src/assets/wetherIcon.png" />
  </head>
  <body>
    <section class="screen">
      <div class="screen__container">
        <div id="weather-bg"></div>
        <div id="rain-container"></div>
        <div id="stars-container"></div>
        <div class="loading-overlay">
          <div class="lds-default">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
        <div class="action-buttons button">
          <button class="action-buttons__menu">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
              class="action-buttons__menu button">
              <path
                fill-rule="evenodd"
                d="M7.72 12.53a.75.75 0 0 1 0-1.06l7.5-7.5a.75.75 0 1 1 1.06 1.06L9.31 12l6.97 6.97a.75.75 0 1 1-1.06 1.06l-7.5-7.5Z"
                clip-rule="evenodd" />
            </svg>
          </button>
          <button class="action-buttons__save">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="action-buttons__save button">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" />
            </svg>
          </button>
        </div>
        <div class="current-weather"></div>
        <div class="forecast-weather inline"></div>
        <!-- AB HIER BAUEN! -->
        <div class="forecast-threeDay inline">
          <p class="forecast-threeDay__title">Vorhersage für die nächsten 3 Tage:</p>
          <div class="forecast-threeDay__threeDay-container">
            <p class="forecast-threeDay__text">Heute</p>
            <img
              src="https://cdn.weatherapi.com/weather/64x64/day/176.png"
              alt=""
              class="forecast-threeDay__img" />
            <span class="forecast-threeDay__highestTemp">H:21°</span>
            <span class="forecast-threeDay__lowestTemp">T:18°</span>
            <span class="forecast-threeDay__WindTempo">Wind: 8.3 kmh/h</span>
          </div>
          <!-- AB HIER AUTOMATISCH FÜLLEN -->
          <div class="forecast-threeDay__threeDay-container">
            <p class="forecast-threeDay__text">So</p>
            <img
              src="https://cdn.weatherapi.com/weather/64x64/day/176.png"
              alt=""
              class="forecast-threeDay__img" />
            <span class="forecast-threeDay__highestTemp">H:21°</span>
            <span class="forecast-threeDay__lowestTemp">T:18°</span>
            <span class="forecast-threeDay__WindTempo">Wind: 8.3 kmh/h</span>
          </div>
          <div class="forecast-threeDay__threeDay-container">
            <p class="forecast-threeDay__text">Mo</p>
            <img
              src="https://cdn.weatherapi.com/weather/64x64/day/176.png"
              alt=""
              class="forecast-threeDay__img" />
            <span class="forecast-threeDay__highestTemp">H:21°</span>
            <span class="forecast-threeDay__lowestTemp">T:18°</span>
            <span class="forecast-threeDay__WindTempo">Wind: 8.3 kmh/h</span>
          </div>
        </div>
      </div>
    </section>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
