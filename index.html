<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wetter App</title>
    <link rel="icon" href="src/assets/wetherIcon.png" />
  </head>
  <body>
    <section class="screen">
      <div class="screen__toggle">
        <button id="theme-toggle" class="screen__button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="screen-img">
            <path
              fill-rule="evenodd"
              d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.7-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z"
              clip-rule="evenodd" />
          </svg>
        </button>
      </div>

      <div class="screen__container">
        <div class="loading-overlay">
          <div class="loading-overlay__title-city"></div>
          <div class="loading-overlay__title-menu"></div>
          <div class="lds-default">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
        <div class="smartphone-notch">
          <div class="smartphone-info"></div>
          <div class="smartphone-speaker"></div>
          <div class="smartphone-camera"></div>
        </div>

        <div class="weather-background-wrapper">
          <div id="weather-bg"></div>
          <div id="rain-container"></div>
          <div id="stars-container"></div>
        </div>

        <div class="app-content-scrollable"></div>

        <div class="menu"></div>
      </div>
    </section>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
